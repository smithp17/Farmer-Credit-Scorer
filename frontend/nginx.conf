server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to backend so the browser never needs to know the backend host
    location ~ ^/(score|scores|drift|health) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
